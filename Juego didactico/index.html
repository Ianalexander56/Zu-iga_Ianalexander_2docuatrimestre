<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia Futurista</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div id="inicio" class="pantalla">
    <h1>TRIVIA FUTURISTA</h1>
    <p>Pon a prueba tu conocimiento</p>
    <button onclick="iniciarJuego()">INICIAR JUEGO</button>
</div>

<div id="juego" class="pantalla oculto">

    <h2 id="pregunta"></h2>

    <div class="opciones">
        <button onclick="responder(0)" id="op0"></button>
        <button onclick="responder(1)" id="op1"></button>
        <button onclick="responder(2)" id="op2"></button>
        <button onclick="responder(3)" id="op3"></button>
    </div>

    <p id="resultado"></p>

    <p>Puntaje: <span id="puntaje">0</span></p>

</div>

<div id="final" class="pantalla oculto">

<h1>Juego terminado</h1>

<p>Tu puntaje fue:</p>

<h2 id="puntajeFinal"></h2>

<button onclick="reiniciar()">Jugar otra vez</button>

</div>

<script src="script.js"></script>

</body>
</html>
