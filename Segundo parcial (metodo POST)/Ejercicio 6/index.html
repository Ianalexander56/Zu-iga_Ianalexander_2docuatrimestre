<!DOCTYPE html>
<html>
<head>
    <title>Conversor de Monedas</title>
</head>
<body>

<h2>Conversor de MXN a USD y EUR</h2>

<form action="conversion.php" method="POST">

Monto en pesos (MXN):<br>
<input type="number" step="0.01" name="mxn" required><br><br>

Tipo de cambio (MXN por 1 USD):<br>
<input type="number" step="0.01" name="usd" required><br><br>

Tipo de cambio (MXN por 1 EUR):<br>
<input type="number" step="0.01" name="eur" required><br><br>

<input type="submit" value="Convertir">

</form>

</body>
</html>
